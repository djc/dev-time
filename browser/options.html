<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Work Tracker Options</title>
    <style>
      body {
        font: message-box;
        font-size: 15px;
        background-color: #f9f9fb;
        color: #15141a;
        margin: 0;
        padding: 20px 40px;
      }
      label {
        font-weight: 600;
        display: block;
        margin-bottom: 4px;
      }
      input[type="text"], input[type="url"] {
        font: inherit;
        font-size: 14px;
        padding: 6px 8px;
        border: 1px solid #cfcfd8;
        border-radius: 4px;
        background-color: #fff;
        color: #15141a;
        width: 320px;
      }
      input:focus {
        outline: 2px solid #0061e0;
        outline-offset: -1px;
      }
      button {
        font: inherit;
        font-size: 14px;
        padding: 6px 16px;
        border: none;
        border-radius: 4px;
        background-color: #e0e0e6;
        color: #15141a;
        cursor: pointer;
      }
      button:hover {
        background-color: #cfcfd8;
      }
      button:active {
        background-color: #b8b8c2;
      }
      p {
        margin: 12px 0;
      }
      details {
        margin-top: 16px;
      }
      summary {
        cursor: pointer;
        font-weight: 600;
      }
      table {
        border-collapse: collapse;
        margin-top: 8px;
        font-size: 14px;
      }
      th, td {
        text-align: left;
        padding: 4px 12px;
        border-bottom: 1px solid #cfcfd8;
      }
      th {
        font-weight: 600;
      }
      a {
        color: #0061e0;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #2b2a33;
          color: #fbfbfe;
        }
        input[type="text"], input[type="url"] {
          background-color: #42414d;
          color: #fbfbfe;
          border-color: #8f8f9d;
        }
        input:focus {
          outline-color: #00ddff;
        }
        button {
          background-color: #42414d;
          color: #fbfbfe;
        }
        button:hover {
          background-color: #52525e;
        }
        button:active {
          background-color: #5b5b66;
        }
        th, td {
          border-bottom-color: #52525e;
        }
        a {
          color: #00ddff;
        }
      }
    </style>
  </head>
  <body>
    <form id="options">
      <p>
        <label for="host">Host:</label>
        <input type="text" id="host" size="40" placeholder="my-machine" />
      </p>
      <p>
        <label for="syncUrl">Sync URL:</label>
        <input type="url" id="syncUrl" size="40" placeholder="http://localhost:3000/sync" />
      </p>
      <button type="submit">Save</button>
    </form>
    <p id="status"></p>
    <p><button id="syncNow" type="button">Sync now</button> <span id="syncStatus"></span></p>
    <details id="unsyncedDetails">
      <summary>Unsynced runs (<span id="unsyncedCount">0</span>)</summary>
      <table id="unsyncedTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Context</th>
            <th>Start</th>
            <th>End</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </details>
    <script src="options.js"></script>
  </body>
</html>
